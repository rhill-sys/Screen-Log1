.ambient{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse at 15% 5%,rgba(123,47,247,0.07) 0%,transparent 55%),radial-gradient(ellipse at 85% 95%,rgba(229,9,20,0.04) 0%,transparent 55%)}
.wrap{position:relative;z-index:1;max-width:1080px;margin:0 auto;padding:0 16px}

.logo{font-family:'Playfair Display',serif;font-size:40px;font-weight:900;background:linear-gradient(135deg,#fff 0%,#b8b8d0 40%,#7B2FF7 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sub{font-size:12px;color:rgba(255,255,255,0.4);margin-top:6px;font-weight:300;letter-spacing:0.2em;text-transform:uppercase}

.user-bar{display:flex;align-items:center;justify-content:center;gap:6px;flex-wrap:wrap;padding:8px 0;margin-bottom:6px}
.ubtn{border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.6);padding:5px 14px;border-radius:20px;cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;transition:all 0.2s}
.ubtn:hover{border-color:rgba(123,47,247,0.3);color:rgba(255,255,255,0.7)}
.ubtn.on{background:rgba(123,47,247,0.2);border-color:rgba(123,47,247,0.5);color:#fff}
.ubtn.add{border-style:dashed;background:transparent;color:rgba(255,255,255,0.5);border-color:rgba(255,255,255,0.25)}
.rm-user{font-size:10px;color:rgba(255,255,255,0.15);background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;display:block;margin:0 auto 12px}
.rm-user:hover{color:#E50914}

.tabs{display:flex;justify-content:center;gap:3px;margin-bottom:22px;flex-wrap:wrap}
.tab{background:transparent;border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.5);padding:7px 18px;border-radius:24px;cursor:pointer;font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;transition:all 0.2s}
.tab.on{background:rgba(123,47,247,0.22);border-color:rgba(123,47,247,0.45);color:#fff}
.tc{margin-left:6px;padding:1px 7px;border-radius:10px;font-size:11px}
.tab.on .tc{background:rgba(123,47,247,0.3)}
.tab:not(.on) .tc{background:rgba(255,255,255,0.08)}

.search-w{max-width:500px;margin:0 auto 28px;position:relative}
.search-i{width:100%;padding:13px 18px 13px 44px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.18);border-radius:10px;color:#fff;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.2s}
.search-i:focus{border-color:rgba(123,47,247,0.6)}
.si{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:16px;opacity:0.3;pointer-events:none}
.sl{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:11px;color:rgba(123,47,247,0.6)}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:16px;padding-bottom:40px}
.sec{margin-bottom:32px}
.sec-h{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.sec-t{font-family:'Playfair Display',serif;font-size:18px;font-weight:600;color:rgba(255,255,255,0.85)}
.sec-i{font-size:18px}
.srow{display:flex;gap:14px;overflow-x:auto;padding-bottom:8px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch}
.srow>div{min-width:155px;max-width:155px;scroll-snap-align:start;flex-shrink:0}

.card{position:relative;border-radius:10px;overflow:hidden;background:#12122a;transition:transform 0.3s cubic-bezier(.4,0,.2,1),box-shadow 0.3s;display:flex;flex-direction:column;cursor:default}
.card:hover{transform:translateY(-6px);box-shadow:0 16px 48px rgba(0,0,0,0.5),0 0 0 1px rgba(123,47,247,0.15)}
.cposter{position:relative;padding-top:150%;background:#0a0a1a}
.cposter img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;transition:opacity 0.5s}
.cph{position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#1a1a2e,#16213e);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;padding:14px;text-align:center}
.cph-e{font-size:32px;opacity:0.4}

.badge{position:absolute;top:8px;left:8px;color:#fff;font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;letter-spacing:0.1em;text-transform:uppercase;font-family:'DM Sans',sans-serif}
.b-m{background:#E50914}
.b-t{background:#7B2FF7}
.rb{position:absolute;top:8px;right:8px;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);color:#F6C700;font-size:11px;font-weight:700;padding:2px 7px;border-radius:4px;font-family:'DM Sans',sans-serif}
.cacts{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,0.92));padding:36px 8px 8px;display:flex;gap:5px;justify-content:center;opacity:0;transition:opacity 0.25s}
.card:hover .cacts{opacity:1}
.cinfo{padding:10px 10px 12px;flex:1;display:flex;flex-direction:column;gap:3px}
.ctitle{font-family:'Playfair Display',serif;font-size:13px;font-weight:600;color:#fff;line-height:1.3;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.cyear{font-size:11px;color:rgba(255,255,255,0.35)}

.abtn{border:none;color:#fff;border-radius:6px;padding:6px 12px;cursor:pointer;font-size:11px;font-weight:600;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:4px;transition:all 0.2s}
.abtn:hover{transform:scale(1.05);filter:brightness(1.1)}
.a-wl{background:#7B2FF7}
.a-wd{background:#00B894}
.a-rm{background:#E50914}

.stars{display:flex;gap:2px;margin-top:4px}
.star{font-size:15px;line-height:1;cursor:pointer;transition:color 0.15s,transform 0.15s;user-select:none;color:rgba(255,255,255,0.12)}
.star.on{color:#F6C700}
.star:hover{transform:scale(1.3)}

.stats{display:flex;justify-content:center;gap:28px;margin-bottom:24px;padding:14px 20px;background:rgba(255,255,255,0.025);border-radius:12px;border:1px solid rgba(255,255,255,0.04);flex-wrap:wrap}
.sv{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;line-height:1}
.ss{font-size:15px;margin-left:2px;color:#F6C700}
.slbl{font-size:10px;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:0.12em;margin-top:4px}

.empty{text-align:center;padding:70px 20px;color:rgba(255,255,255,0.35)}
.empty-i{font-size:44px;margin-bottom:14px;opacity:0.5}
.empty-t{font-family:'Playfair Display',serif;font-size:17px}
.empty-s{font-size:12px;margin-top:8px;opacity:0.6}

.toast{position:fixed;bottom:28px;left:50%;background:linear-gradient(135deg,#7B2FF7 0%,#5B1FD7 100%);color:#fff;padding:10px 26px;border-radius:30px;font-size:13px;font-weight:500;pointer-events:none;z-index:1000;box-shadow:0 8px 32px rgba(123,47,247,0.35);transition:all 0.3s cubic-bezier(.4,0,.2,1)}

.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:500;display:flex;align-items:center;justify-content:center;animation:fadeIn 0.2s;backdrop-filter:blur(4px)}
.modal{background:#14142e;border:1px solid rgba(123,47,247,0.3);border-radius:16px;padding:28px;width:320px;max-width:90vw}
.modal h2{font-family:'Playfair Display',serif;font-size:20px;margin-bottom:16px}
.modal input{width:100%;padding:12px 16px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:8px;color:#fff;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;margin-bottom:12px}
.modal input:focus{border-color:rgba(123,47,247,0.6)}
.mbtn{flex:1;padding:10px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;transition:filter 0.2s}
.mbtn:hover{filter:brightness(1.15)}
.mbtn-p{background:#7B2FF7;color:#fff}
.mbtn-s{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.6)}

.footer{text-align:center;padding:40px 0 24px;font-size:10px;color:rgba(255,255,255,0.12)}
.hint{text-align:center;font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:16px}

// ── State ──
let S = {
  user: localStorage.getItem("sl-user")||null,
  tab: "discover",
  query: "",
  results: [],
  trending: [], nowPlaying: [], onTheAir: [], upcoming: [],
  loading: false
};

function getStore(){ try{return JSON.parse(localStorage.getItem("sl-store"))||{}}catch{return{}} }
function setStore(s){ localStorage.setItem("sl-store",JSON.stringify(s)) }
function getData(){ const s=getStore(); return s[S.user]||{watchlist:[],watched:[]} }
function setData(d){ const s=getStore(); s[S.user]=d; setStore(s) }
function getUsers(){ return Object.keys(getStore()) }

// ── Toast ──
let toastTimer;
function toast(msg){
  const el=document.getElementById("toast");
  el.textContent=msg; el.style.opacity="1"; el.style.transform="translateX(-50%) translateY(0)";
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{el.style.opacity="0";el.style.transform="translateX(-50%) translateY(20px)"},2200);
}

// ── DOM helper ──
function el(tag, props, ...kids){
  const e = document.createElement(tag);
  if(props) for(const[k,v] of Object.entries(props)){
    if(k==="style"&&typeof v==="object") Object.assign(e.style,v);
    else if(k==="className") e.className=v;
    else if(k==="innerHTML") e.innerHTML=v;
    else if(k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  }
  for(const c of kids.flat(10)){
    if(c==null||c===false) continue;
    e.appendChild(typeof c==="string"?document.createTextNode(c):c);
  }
  return e;
}

// ── Card builder ──
function mkCard(item, listType, delay){
  const title=item.title||item.name||"Untitled";
  const year=(item.release_date||item.first_air_date||"").slice(0,4);
  const type=item.media_type==="tv"?"TV":"Film";
  const poster=item.poster_path?IMG+item.poster_path:null;

  const acts=[];
  if(listType==="search"&&S.user){
    acts.push(el("button",{className:"abtn a-wl",onClick:()=>addTo(item,"watchlist")},el("span",{},"👁")," Watchlist"));
    acts.push(el("button",{className:"abtn a-wd",onClick:()=>addTo(item,"watched")},el("span",{},"✓")," Watched"));
  }
  if(listType==="watchlist"){
    acts.push(el("button",{className:"abtn a-wd",onClick:()=>addTo(item,"watched")},el("span",{},"✓")," Watched"));
    acts.push(el("button",{className:"abtn a-rm",onClick:()=>removeFrom(item.id,"watchlist")},el("span",{},"✕")," Remove"));
  }
  if(listType==="watched"){
    acts.push(el("button",{className:"abtn a-rm",onClick:()=>removeFrom(item.id,"watched")},el("span",{},"✕")," Remove"));
  }

  const posterEl = poster
    ? el("img",{src:poster,alt:title,style:{opacity:"0"},onLoad:function(){this.style.opacity="1"}})
    : el("div",{className:"cph"},el("span",{className:"cph-e"},type==="TV"?"📺":"🎬"),el("span",{className:"cph-n"},title));

  const stars = listType==="watched" ? mkStars(item) : null;

  return el("div",{className:"card",style:{animation:"fadeUp 0.45s "+delay+"s both"}},
    el("div",{className:"cposter"},
      posterEl,
      el("span",{className:"badge "+(type==="TV"?"b-t":"b-m")},type),
      item.vote_average>0?el("span",{className:"rb"},"★ "+Number(item.vote_average).toFixed(1)):null,
      acts.length?el("div",{className:"cacts"},...acts):null
    ),
    el("div",{className:"cinfo"},
      el("div",{className:"ctitle"},title),
      el("div",{className:"cyear"},year),
      stars
    )
  );
}

function mkStars(item){
  const c=el("div",{className:"stars"});
  for(let i=1;i<=5;i++){
    const s=el("span",{className:"star"+(i<=(item.userRating||0)?" on":""),onClick:(function(r){return function(){rateItem(item.id,r)}})(i)},"★");
    c.appendChild(s);
  }
  return c;
}

function mkSection(title,items,icon){
  if(!items.length) return null;
  const row=el("div",{className:"srow"});
  items.forEach((item,i)=>{
    row.appendChild(el("div",{},mkCard(item,"search",i*0.04)));
  });
  return el("div",{className:"sec"},
    el("div",{className:"sec-h"},el("span",{className:"sec-i"},icon),el("h2",{className:"sec-t"},title)),
    row
  );
}

// ── Actions ──
function addTo(item,list){
  if(!S.user){toast("Add a user first");return}
  const d=getData();
  const target=list==="watchlist"?d.watchlist:d.watched;
  if(target.find(i=>i.id===item.id)){toast("Already added");return}
  const entry={id:item.id,title:item.title||item.name,name:item.name||item.title,media_type:item.media_type,release_date:item.release_date||"",first_air_date:item.first_air_date||"",poster_path:item.poster_path,vote_average:item.vote_average,userRating:0,addedAt:Date.now()};
  if(list==="watchlist"){d.watched=d.watched.filter(i=>i.id!==item.id);d.watchlist=[entry,...d.watchlist]}
  else{d.watchlist=d.watchlist.filter(i=>i.id!==item.id);d.watched=[entry,...d.watched]}
  setData(d);toast(list==="watchlist"?"Added to Watchlist ✓":"Added to Watched ✓");render();
}

function removeFrom(id,list){
  const d=getData();
  if(list==="watchlist")d.watchlist=d.watchlist.filter(i=>i.id!==id);
  else d.watched=d.watched.filter(i=>i.id!==id);
  setData(d);toast("Removed");render();
}

function rateItem(id,r){
  const d=getData();
  d.watched=d.watched.map(i=>i.id===id?{...i,userRating:r}:i);
  setData(d);toast("Rated "+r+" star"+(r!==1?"s":"")+" ★");render();
}

function switchUser(name){S.user=name;localStorage.setItem("sl-user",name);render()}

function addUser(name){
  name=name.trim(); if(!name) return;
  const s=getStore(); if(!s[name]) s[name]={watchlist:[],watched:[]};
  setStore(s); switchUser(name);
}

function removeUser(name){
  if(!confirm("Remove "+name+" and all their data?")) return;
  const s=getStore(); delete s[name]; setStore(s);
  if(S.user===name){const r=Object.keys(s);S.user=r[0]||null;localStorage.setItem("sl-user",S.user||"")}
  render();
}

// ── TMDB ──
async function loadDiscover(){
  try{
    const[t,np,ota,up]=await Promise.all([
      fetch(u("/trending/all/day")).then(r=>r.ok?r.json():{results:[]}),
      fetch(u("/movie/now_playing")).then(r=>r.ok?r.json():{results:[]}),
      fetch(u("/tv/on_the_air")).then(r=>r.ok?r.json():{results:[]}),
      fetch(u("/movie/upcoming")).then(r=>r.ok?r.json():{results:[]}),
    ]);
    S.trending=(t.results||[]).filter(r=>r.media_type!=="person").slice(0,20);
    S.nowPlaying=(np.results||[]).map(r=>({...r,media_type:"movie"})).slice(0,20);
    S.onTheAir=(ota.results||[]).map(r=>({...r,media_type:"tv"})).slice(0,20);
    S.upcoming=(up.results||[]).map(r=>({...r,media_type:"movie"})).slice(0,15);
  }catch{}
  if(!S.trending.length) S.trending=FALLBACK.trending||[];
  if(!S.nowPlaying.length) S.nowPlaying=FALLBACK.now_playing||[];
  if(!S.onTheAir.length) S.onTheAir=FALLBACK.on_the_air||[];
  if(!S.upcoming.length) S.upcoming=FALLBACK.upcoming||[];
  render();
}

let searchTimer;
async function doSearch(q){
  if(!q.trim()){S.results=[];S.loading=false;render();return}
  S.loading=true;
  const url=u("/search/multi","&query="+encodeURIComponent(q));
  console.log("Searching:",url);
  try{
    const r=await fetch(url);
    console.log("TMDB response status:",r.status);
    if(!r.ok) throw new Error("HTTP "+r.status);
    const d=await r.json();
    console.log("TMDB results:",d.results?.length);
    S.results=(d.results||[]).filter(r=>r.media_type!=="person").slice(0,24);
  }catch(err){
    console.error("Search failed, using fallback:",err);
    const lw=q.toLowerCase();
    const all=[...(FALLBACK.trending||[]),...(FALLBACK.now_playing||[]),...(FALLBACK.on_the_air||[]),...(FALLBACK.upcoming||[])];
    const seen=new Set();
    S.results=all.filter(i=>{if(seen.has(i.id))return false;seen.add(i.id);return(i.title||i.name||"").toLowerCase().includes(lw)}).slice(0,24);
  }
  S.loading=false;render();
}

// ── Render ──
let modalOpen=false;

function render(){
  const app=document.getElementById("app");
  app.innerHTML="";
  const data=S.user?getData():{watchlist:[],watched:[]};
  const users=getUsers();

  // Header
  app.appendChild(el("header",{style:{paddingTop:"36px",paddingBottom:"8px",textAlign:"center"}},
    el("h1",{className:"logo"},"ScreenLog"),
    el("p",{className:"sub"},"Track · Rate · Remember")
  ));

  // User bar
  const ub=el("div",{className:"user-bar"});
  users.forEach(name=>{
    ub.appendChild(el("button",{className:"ubtn"+(name===S.user?" on":""),onClick:()=>switchUser(name)},name));
  });
  ub.appendChild(el("button",{className:"ubtn add",onClick:()=>{modalOpen=true;renderModal()}},"+ Add"));
  app.appendChild(ub);

  if(S.user) app.appendChild(el("button",{className:"rm-user",onClick:()=>removeUser(S.user)},"remove "+S.user));
  else app.appendChild(el("p",{className:"hint"},users.length?"Select a user above":"Tap + Add to get started"));

  // Tabs
  const tabs=[{id:"discover",l:"Discover",c:null},{id:"watchlist",l:"Watchlist",c:data.watchlist.length},{id:"watched",l:"Watched",c:data.watched.length}];
  const tn=el("nav",{className:"tabs"});
  tabs.forEach(t=>{
    const b=el("button",{className:"tab"+(S.tab===t.id?" on":""),onClick:()=>{S.tab=t.id;render()}},t.l);
    if(t.c!==null) b.appendChild(el("span",{className:"tc"},""+t.c));
    tn.appendChild(b);
  });
  app.appendChild(tn);

  // Discover
  if(S.tab==="discover"){
    const sw=el("div",{className:"search-w"});
    const wasFocused = document.activeElement && document.activeElement.classList.contains("search-i");
    const inp=el("input",{className:"search-i",placeholder:"Search any movie or TV show...",
      onInput:function(e){S.query=e.target.value;clearTimeout(searchTimer);searchTimer=setTimeout(()=>doSearch(S.query),400)},
      onFocus:function(){this.style.borderColor="rgba(123,47,247,0.6)"},
      onBlur:function(){this.style.borderColor="rgba(255,255,255,0.18)"}
    });
    inp.value = S.query;
    sw.appendChild(inp);
    sw.appendChild(el("span",{className:"si"},"⌕"));
    if(S.loading) sw.appendChild(el("span",{className:"sl",innerHTML:'<span style="display:inline-block;animation:pulse 1.2s infinite">●</span> searching...'}));
    app.appendChild(sw);
    // Restore focus after DOM is built
    if(wasFocused || S.query) { requestAnimationFrame(()=>{ inp.focus(); inp.setSelectionRange(S.query.length, S.query.length); }); }

    if(S.query){
      app.appendChild(el("h2",{style:{fontFamily:"'Playfair Display',serif",fontSize:"18px",fontWeight:600,margin:"0 0 16px",color:"rgba(255,255,255,0.6)"}},'Results for "'+S.query+'"'));
      if(S.results.length){
        const g=el("div",{className:"grid"});
        S.results.forEach((item,i)=>g.appendChild(mkCard(item,"search",i*0.035)));
        app.appendChild(g);
      } else if(!S.loading){
        app.appendChild(el("div",{className:"empty"},el("div",{className:"empty-i"},"🔍"),el("p",{className:"empty-t"},"No results found")));
      }
    } else {
      [mkSection("Trending Today",S.trending,"🔥"),mkSection("In Theaters Now",S.nowPlaying,"🎬"),mkSection("New TV This Week",S.onTheAir,"📺"),mkSection("Coming Soon",S.upcoming,"🗓")].forEach(s=>{if(s)app.appendChild(s)});
      if(!S.trending.length) app.appendChild(el("div",{style:{textAlign:"center",padding:"40px",color:"rgba(255,255,255,0.2)"},innerHTML:'<span style="animation:pulse 1.5s infinite;font-size:14px">Loading from TMDB...</span>'}));
    }
  }

  // Watchlist
  if(S.tab==="watchlist"){
    if(data.watchlist.length){
      const g=el("div",{className:"grid"});
      data.watchlist.forEach((item,i)=>g.appendChild(mkCard(item,"watchlist",i*0.035)));
      app.appendChild(g);
    } else {
      app.appendChild(el("div",{className:"empty"},el("div",{className:"empty-i"},"👁"),el("p",{className:"empty-t"},S.user?"Your watchlist is empty":"Select a user first"),el("p",{className:"empty-s"},"Head to Discover to find something great")));
    }
  }

  // Watched
  if(S.tab==="watched"){
    if(data.watched.length){
      const rated=data.watched.filter(i=>i.userRating>0);
      const avg=rated.length?(rated.reduce((s,i)=>s+i.userRating,0)/rated.length).toFixed(1):"—";
      app.appendChild(el("div",{className:"stats"},
        el("div",{style:{textAlign:"center",minWidth:"70px"}},el("div",{className:"sv"},""+data.watched.length),el("div",{className:"slbl"},"Watched")),
        el("div",{style:{textAlign:"center",minWidth:"70px"}},el("div",{className:"sv"},""+rated.length),el("div",{className:"slbl"},"Rated")),
        el("div",{style:{textAlign:"center",minWidth:"70px"}},el("div",{className:"sv",innerHTML:avg+'<span class="ss">★</span>'}),el("div",{className:"slbl"},"Avg Rating"))
      ));
      const g=el("div",{className:"grid"});
      data.watched.forEach((item,i)=>g.appendChild(mkCard(item,"watched",i*0.035)));
      app.appendChild(g);
    } else {
      app.appendChild(el("div",{className:"empty"},el("div",{className:"empty-i"},"✓"),el("p",{className:"empty-t"},S.user?"Nothing watched yet":"Select a user first"),el("p",{className:"empty-s"},"Head to Discover to find something great")));
    }
  }

  app.appendChild(el("div",{className:"footer"},"Data from TMDB · This product uses the TMDB API but is not endorsed or certified by TMDB."));
}

function renderModal(){
  let m=document.getElementById("modal");
  if(m) m.remove();
  if(!modalOpen) return;
  const ov=el("div",{id:"modal",className:"modal-ov",onClick:function(e){if(e.target===e.currentTarget){modalOpen=false;renderModal()}}});
  const box=el("div",{className:"modal"});
  box.appendChild(el("h2",{},"Who's watching?"));
  const inp=el("input",{placeholder:"Enter your name...",onKeydown:function(e){if(e.key==="Enter"){addUser(this.value);modalOpen=false;renderModal()}}});
  box.appendChild(inp);
  const btns=el("div",{style:{display:"flex",gap:"8px"}});
  btns.appendChild(el("button",{className:"mbtn mbtn-s",onClick:function(){modalOpen=false;renderModal()}},"Cancel"));
  btns.appendChild(el("button",{className:"mbtn mbtn-p",onClick:function(){addUser(inp.value);modalOpen=false;renderModal()}},"Add"));
  box.appendChild(btns);
  ov.appendChild(box);
  document.body.appendChild(ov);
  setTimeout(()=>inp.focus(),50);
}

// ── Init ──
render();
loadDiscover();
</script>
